services:

  # ── Jarvis API ─────────────────────────────────────────────────────────────
  jarvis:
    build: .
    container_name: jarvis-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Datos persistentes (memoria SQLite, proyectos)
      - jarvis-data:/app/data
      # Credenciales Google OAuth
      - ./credentials:/app/credentials:ro
      # ⭐ Config del Claude CLI — persiste el login OAuth entre reinicios
      # Después del primer "claude auth login" no hace falta volver a hacer login
      - claude-config:/root/.claude
    networks:
      - jarvis-net

  # ── Ollama (LLM fallback) ──────────────────────────────────────────────────
  # Solo se usa si Claude CLI no está autenticado.
  # Puedes eliminarlo si siempre usas Claude.
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - jarvis-net
    # GPU NVIDIA — descomenta si la tienes:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Ollama model puller (se ejecuta una vez y sale) ────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: jarvis-ollama-pull
    restart: "no"
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama pull ${OLLAMA_MODEL:-llama3.2} &&
        echo 'Model pulled OK'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - jarvis-net

volumes:
  jarvis-data:
  ollama-models:
  claude-config:    # ⭐ Persiste la sesión OAuth del claude CLI

networks:
  jarvis-net:
    driver: bridge
