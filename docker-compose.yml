services:

  # ── Jarvis API ─────────────────────────────────────────────────────────────
  jarvis:
    build: .
    container_name: jarvis-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - jarvis-data:/app/data
      - ./credentials:/app/credentials:ro
      # ⭐ Config del Claude CLI — persiste el login OAuth entre reinicios
      # Después del primer "claude auth login" no hace falta volver a hacer login
      - claude-config:/home/jarvis/.claude
    networks:
      - jarvis-net

  # ── Ollama (fallback opcional) ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - jarvis-net

  # ── Descarga el modelo Ollama (una sola vez) ───────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: jarvis-ollama-pull
    restart: "no"
    entrypoint: >
      sh -c "
        sleep 10 &&
        ollama pull ${OLLAMA_MODEL:-llama3.2} &&
        echo 'Model pulled OK'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - jarvis-net

volumes:
  jarvis-data:
  ollama-models:
  claude-config:

networks:
  jarvis-net:
    driver: bridge
